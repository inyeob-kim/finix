[alembic]
script_location = alembic
prepend_sys_path = .

# The sync URL used by Alembic. We keep runtime DB async (asyncmy/aiomysql),
# but migrations run via a sync driver for best compatibility.
# Overridden at runtime by alembic/env.py from DATABASE_URL_SYNC or DATABASE_URL.
sqlalchemy.url = sqlite:///./finix_db.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

